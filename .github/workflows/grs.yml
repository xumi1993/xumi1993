name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *" # Runs once daily at midnight
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=ambient_gradient
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=xumi1993&layout=compact&hide=jupyter%20notebook,java,cmake,m,perl,matlab,html,shell,css,scss
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: seispy
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=xumi1993&repo=seispy&show_owner=true&theme=onedark
          path: profile/seispy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: specfwat
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=xumi1993&repo=SpecFWAT&show_owner=true&theme=onedark
          path: profile/specfwat.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: surfatt
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=xumi1993&repo=surfatt-iso&show_owner=true&theme=onedark
          path: profile/surfatt.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: pytomoatt
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=tomoatt&repo=pytomoatt&show_owner=true&theme=onedark
          path: profile/pytomoatt.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
